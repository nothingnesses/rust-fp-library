name: Release

on:
  push:
    tags:
      - "fp-library-v*"
      - "fp-macros-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop ./devenv/ --command cargo test --workspace --all-features
      - run: nix develop ./devenv/ --command cargo clippy --workspace --all-features -- -D warnings
      - run: nix develop ./devenv/ --command cargo doc --workspace --all-features --no-deps

  publish-macros:
    name: Publish fp-macros
    needs: validate
    if: startsWith(github.ref, 'refs/tags/fp-macros-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix develop ./devenv/ --command cargo publish -p fp-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-library:
    name: Publish fp-library
    needs: validate
    if: startsWith(github.ref, 'refs/tags/fp-library-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Wait for crates.io to index fp-macros if both tags were pushed together
      - name: Wait for fp-macros to be indexed
        if: contains(github.event.head_commit.message, 'fp-macros')
        run: sleep 30
      - run: nix develop ./devenv/ --command cargo publish -p fp-library
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub Release
    needs: [publish-macros, publish-library]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
